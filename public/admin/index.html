<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yellow Leaf Cafe — Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    :root {
      --brand: #16a34a; --brand-dark: #15803d; --brand-light: #f0fdf4; --brand-bg: #dcfce7;
      --bg: #f1f5f9; --surface: #ffffff; --text: #0f172a; --text-2: #475569; --text-3: #94a3b8;
      --border: #e2e8f0; --border-light: #f1f5f9; --danger: #ef4444; --danger-bg: #fef2f2;
      --r: 10px; --r-lg: 14px;
      --shadow-xs: 0 1px 2px rgba(0,0,0,0.04); --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.07); --shadow-lg: 0 8px 28px rgba(0,0,0,0.1);
    }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif !important; background: var(--bg) !important; color: var(--text) !important; -webkit-font-smoothing: antialiased !important; margin: 0; }

    /* BRANDED HEADER */
    [class*="AppHeader"], header[class*="Header"] { background: linear-gradient(135deg, #0f3d1f 0%, #15803d 100%) !important; border-bottom: none !important; box-shadow: 0 2px 12px rgba(0,0,0,0.15) !important; padding: 0 20px !important; height: 60px !important; }
    [class*="AppHeader"] a, [class*="AppHeader"] span, [class*="AppHeader"] button, header[class*="Header"] a { color: rgba(255,255,255,0.9) !important; font-weight: 500 !important; font-size: 13px !important; text-decoration: none !important; }
    [class*="AppHeader"] a:hover { color: #fff !important; }
    [class*="AppHeaderContent"]::before { content: '🌿 Yellow Leaf Cafe'; font-weight: 800; font-size: 17px; color: #fff; margin-right: 20px; }
    [class*="AppHeader"] [class*="active"], [class*="AppHeader"] [aria-selected="true"] { background: rgba(255,255,255,0.18) !important; color: #fff !important; font-weight: 700 !important; border-radius: 8px !important; padding: 6px 14px !important; }

    /* SIDEBAR */
    [class*="Sidebar"], nav[class*="Collection"] { background: var(--surface) !important; border-right: 1px solid var(--border) !important; padding: 20px 10px !important; }
    [class*="SidebarHeading"] { color: var(--text-3) !important; font-weight: 800 !important; font-size: 10px !important; text-transform: uppercase !important; letter-spacing: 1.5px !important; padding: 16px 14px 8px !important; }
    [class*="SidebarNavLink"], [class*="NavLink"] { color: var(--text-2) !important; font-weight: 500 !important; font-size: 14px !important; padding: 11px 14px !important; margin: 2px 4px !important; border-radius: var(--r) !important; transition: all 0.15s !important; border-left: 3px solid transparent !important; }
    [class*="SidebarNavLink"]:hover, [class*="NavLink"]:hover { background: var(--brand-light) !important; color: var(--brand-dark) !important; border-left-color: var(--brand) !important; }
    [class*="SidebarNavLink"][class*="active"], [class*="NavLink"][class*="active"], [class*="SidebarNavLink"][class*="selected"] { background: var(--brand) !important; color: white !important; font-weight: 600 !important; border-left-color: transparent !important; box-shadow: 0 2px 8px rgba(22,163,74,0.25) !important; }

    /* MAIN */
    [class*="Main"], main { background: var(--bg) !important; }

    /* COLLECTION TOP */
    [class*="CollectionTop"] { background: var(--surface) !important; padding: 20px 28px !important; border-bottom: 1px solid var(--border) !important; box-shadow: var(--shadow-xs) !important; }
    [class*="CollectionTop"] h1 { font-family: 'Inter', sans-serif !important; font-weight: 800 !important; font-size: 22px !important; color: var(--text) !important; }

    /* ENTRY CARDS */
    [class*="Card"], [class*="EntryCard"], [class*="ListCardLink"] { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: var(--r-lg) !important; box-shadow: var(--shadow-xs) !important; transition: all 0.2s !important; color: var(--text) !important; }
    [class*="Card"]:hover, [class*="EntryCard"]:hover { box-shadow: var(--shadow-md) !important; border-color: var(--brand) !important; transform: translateY(-1px) !important; }

    /* EDITOR */
    [class*="ControlPane"], [class*="EditorControlPane"] { max-width: 960px !important; padding: 28px 24px !important; }

    /* LABELS */
    label, [class*="ControlLabel"], [class*="FieldLabel"], [class*="ObjectWidgetLabel"], [class*="ListLabel"] { color: var(--text) !important; font-weight: 600 !important; font-size: 12px !important; text-transform: uppercase !important; letter-spacing: 0.6px !important; margin-bottom: 6px !important; display: block !important; }

    /* INPUTS */
    input[type="text"], input[type="number"], input[type="email"], input[type="url"], input[type="password"], textarea, select { background: var(--surface) !important; border: 1.5px solid var(--border) !important; border-radius: var(--r) !important; color: var(--text) !important; padding: 11px 14px !important; font-size: 14px !important; font-family: 'Inter', sans-serif !important; transition: border-color 0.2s, box-shadow 0.2s !important; width: 100% !important; }
    input:focus, textarea:focus, select:focus { border-color: var(--brand) !important; box-shadow: 0 0 0 3px rgba(22,163,74,0.1) !important; outline: none !important; }
    textarea { min-height: 100px !important; resize: vertical !important; }
    input::placeholder, textarea::placeholder { color: var(--text-3) !important; }
    [class*="ControlHint"] { color: var(--text-3) !important; font-size: 11px !important; margin-top: 4px !important; }

    /* BUTTONS */
    button, [class*="Button"], [role="button"] { font-family: 'Inter', sans-serif !important; border-radius: var(--r) !important; font-weight: 600 !important; font-size: 13px !important; cursor: pointer !important; transition: all 0.15s ease !important; }
    [class*="PublishButton"], [class*="ToolbarButton"][class*="enabled"] { background: var(--brand) !important; color: #fff !important; border: none !important; padding: 10px 28px !important; font-size: 14px !important; font-weight: 700 !important; box-shadow: 0 2px 8px rgba(22,163,74,0.3) !important; }
    [class*="PublishButton"]:hover { background: var(--brand-dark) !important; box-shadow: 0 4px 16px rgba(22,163,74,0.35) !important; transform: translateY(-1px) !important; }
    [class*="ListControl"] button, button[class*="add" i], [class*="AddButton"] { background: var(--brand-light) !important; color: var(--brand-dark) !important; border: 1.5px solid var(--brand) !important; padding: 9px 18px !important; }
    [class*="ListControl"] button:hover, [class*="AddButton"]:hover { background: var(--brand) !important; color: #fff !important; }
    [class*="DeleteButton"], button[class*="delete" i], button[class*="remove" i] { background: var(--danger-bg) !important; color: var(--danger) !important; border: 1.5px solid #fecaca !important; }
    [class*="DeleteButton"]:hover { background: var(--danger) !important; color: #fff !important; }

    /* LIST ITEMS */
    [class*="ListItem"], [class*="SortableListItem"] { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: var(--r-lg) !important; margin-bottom: 8px !important; overflow: hidden !important; transition: border-color 0.15s !important; }
    [class*="ListItem"]:hover { border-color: var(--brand) !important; }
    [class*="ListItemTopBar"] { background: linear-gradient(to right, var(--border-light), var(--surface)) !important; border-bottom: 1px solid var(--border) !important; padding: 10px 16px !important; }
    [class*="ListItemTopBar"] span, [class*="ListItemSummary"] { color: var(--text) !important; font-weight: 600 !important; font-size: 14px !important; }
    [class*="ListItemTopBar"] button { background: transparent !important; color: var(--text-2) !important; border: none !important; padding: 4px 8px !important; min-width: auto !important; }
    [class*="ListItemTopBar"] button:last-child:hover { color: var(--danger) !important; background: var(--danger-bg) !important; border-radius: 6px !important; }

    /* NESTED OBJECTS */
    [class*="ObjectWidget"], [class*="ObjectControl"] { background: var(--bg) !important; border: 1px solid var(--border) !important; border-radius: var(--r-lg) !important; padding: 20px !important; margin-bottom: 14px !important; }

    /* TOOLBAR */
    [class*="Toolbar"], [class*="EditorToolbar"] { background: var(--surface) !important; border-bottom: 1px solid var(--border) !important; padding: 10px 24px !important; box-shadow: var(--shadow-xs) !important; }
    [class*="StatusPublished"] { background: var(--brand-bg) !important; color: var(--brand-dark) !important; padding: 4px 14px !important; border-radius: 20px !important; font-weight: 700 !important; font-size: 12px !important; }

    /* MEDIA LIBRARY */
    [class*="MediaLibrary"], [class*="Modal"] { background: var(--surface) !important; border-radius: var(--r-lg) !important; box-shadow: var(--shadow-lg) !important; }
    [class*="MediaLibraryTop"] button, [class*="UploadButton"] { background: var(--brand) !important; color: #fff !important; border: none !important; padding: 10px 24px !important; font-weight: 700 !important; border-radius: var(--r) !important; min-width: 100px !important; }
    [class*="CopyToClipBoardButton"], [class*="DownloadButton"] { background: var(--bg) !important; color: var(--text) !important; border: 1.5px solid var(--border) !important; }
    [class*="DeleteSelectedButton"] { background: var(--danger-bg) !important; color: var(--danger) !important; border: 1.5px solid #fecaca !important; }

    /* IMAGE WIDGET */
    [class*="ImageWidget"], [class*="FileWidget"] { border: 2px dashed var(--border) !important; border-radius: var(--r-lg) !important; background: var(--bg) !important; padding: 24px !important; text-align: center !important; transition: all 0.2s !important; }
    [class*="ImageWidget"]:hover { border-color: var(--brand) !important; background: var(--brand-light) !important; }
    [class*="ImageWidget"] button, [class*="FileWidget"] button { background: var(--brand) !important; color: #fff !important; border: none !important; padding: 8px 20px !important; margin: 4px !important; }

    /* DROPDOWNS */
    [class*="Dropdown"], [class*="Menu"], ul[role="listbox"] { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: var(--r) !important; box-shadow: var(--shadow-lg) !important; }
    [class*="DropdownItem"]:hover, li[role="option"]:hover { background: var(--brand-light) !important; }

    /* SEARCH & SORT */
    [class*="SearchInput"] { background: var(--surface) !important; border: 1.5px solid var(--border) !important; border-radius: var(--r) !important; color: var(--text) !important; }
    [class*="SortControl"] select { background: var(--surface) !important; color: var(--text) !important; border: 1.5px solid var(--border) !important; }

    /* TABLE */
    [class*="TableRow"]:hover { background: var(--border-light) !important; }

    /* BREADCRUMBS */
    [class*="Breadcrumb"] { color: var(--text-3) !important; }
    [class*="Breadcrumb"] a { color: var(--brand) !important; font-weight: 600 !important; }

    /* NOTIFICATIONS */
    [class*="Toast"], [class*="Notification"] { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: var(--r) !important; box-shadow: var(--shadow-lg) !important; color: var(--text) !important; }

    /* LOGIN PAGE */
    [class*="LoginPage"], [class*="AuthenticationPage"] { background: linear-gradient(135deg, #0a1f0a 0%, #15803d 100%) !important; }
    [class*="LoginButton"] { background: var(--brand) !important; color: #fff !important; border: none !important; border-radius: var(--r) !important; padding: 14px 36px !important; font-weight: 700 !important; font-size: 15px !important; box-shadow: 0 4px 16px rgba(22,163,74,0.3) !important; }
    [class*="LoginButton"]:hover { background: var(--brand-dark) !important; transform: translateY(-1px) !important; }

    /* PREVIEW */
    [class*="PreviewPane"] { background: var(--bg) !important; border-left: 1px solid var(--border) !important; }
    [class*="PreviewPane"] * { color: var(--text) !important; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* SAFETY NET */
    [class*="ControlPane"] label { color: var(--text) !important; }
    [class*="ControlPane"] [class*="Hint"] { color: var(--text-3) !important; }
    [class*="Modal"] button { min-width: 80px !important; padding: 8px 16px !important; }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
