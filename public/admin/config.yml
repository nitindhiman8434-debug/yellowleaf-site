backend:
  name: git-gateway
  branch: main

media_folder: "public/images/products"
public_folder: "/images/products"

collections:
  # ═══════════════════════════════════
  # SITE SETTINGS
  # ═══════════════════════════════════
  - name: "settings"
    label: "⚙️ Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "content/settings.json"
        fields:
          - { name: "site_name", label: "Site Name", widget: "string" }
          - { name: "whatsapp_number", label: "WhatsApp Number", widget: "string" }
          - { name: "support_email", label: "Support Email", widget: "string" }
          - { name: "verify_email", label: "Verification Email", widget: "string" }
          - { name: "min_order", label: "Minimum Order ($)", widget: "number", value_type: "int" }
          - { name: "free_ship_min", label: "Free Shipping Minimum ($)", widget: "number", value_type: "int" }
          - { name: "points_per_dollar", label: "Points Per Dollar", widget: "number", value_type: "int" }
          - { name: "points_to_dollar", label: "Points to $1", widget: "number", value_type: "int" }
          - { name: "announce_bar", label: "Announcement Bar Text", widget: "string" }
          - { name: "hero_title", label: "Hero Title", widget: "text" }
          - { name: "hero_subtitle", label: "Hero Subtitle", widget: "text" }
          - { name: "hero_cta_text", label: "Hero Button Text", widget: "string" }
          - { name: "hero_cta_link", label: "Hero Button Link", widget: "string" }
          - name: "service_pillars"
            label: "Service Pillars (Homepage)"
            widget: "list"
            fields:
              - { name: "icon", label: "Icon (emoji)", widget: "string" }
              - { name: "title", label: "Title", widget: "string" }
              - { name: "desc", label: "Description", widget: "string" }

  # ═══════════════════════════════════
  # PRODUCTS
  # ═══════════════════════════════════
  - name: "products"
    label: "🛒 Products"
    file: "content/products.json"
    description: "Add, edit, or remove products"
    widget: "list"
    fields:
      - name: "items"
        label: "Products"
        widget: "list"
        summary: "{{fields.name}} — ${{fields.sale}} ({{fields.category}}/{{fields.subcategory}})"
        fields:
          - { name: "id", label: "ID", widget: "string", hint: "Unique ID like f1, e2, a3" }
          - { name: "name", label: "Product Name", widget: "string" }
          - { name: "slug", label: "URL Slug", widget: "string", hint: "lowercase-with-dashes" }
          - { name: "category", label: "Category", widget: "select", options: ["flowers", "edibles", "accessories"] }
          - { name: "subcategory", label: "Subcategory", widget: "string", hint: "e.g. indica, sativa, hybrid, gummies, grinder" }
          - { name: "image", label: "Product Image", widget: "image", required: false }
          - { name: "price", label: "Original Price ($)", widget: "number", value_type: "float" }
          - { name: "sale", label: "Sale Price ($)", widget: "number", value_type: "float" }
          - { name: "weight", label: "Weight/Size", widget: "string", required: false }
          - { name: "thc", label: "THC (%/mg)", widget: "number", value_type: "float", required: false }
          - { name: "cbd", label: "CBD (%)", widget: "number", value_type: "float", required: false }
          - { name: "rating", label: "Rating (0-5)", widget: "number", value_type: "float", min: 0, max: 5 }
          - { name: "reviews", label: "Review Count", widget: "number", value_type: "int" }
          - { name: "badge", label: "Badge", widget: "string", required: false, hint: "Flash Deal, Best Seller, Premium, 58% OFF, etc." }
          - { name: "desc", label: "Description", widget: "text" }
          - { name: "lineage", label: "Lineage/Genetics", widget: "string", required: false }
          - { name: "aroma", label: "Aroma", widget: "string", required: false }
          - { name: "flavor", label: "Flavor", widget: "string", required: false }

  # ═══════════════════════════════════
  # PAGES
  # ═══════════════════════════════════
  - name: "pages"
    label: "📄 Pages"
    files:
      # --- FAQ ---
      - name: "faq"
        label: "FAQ Page"
        file: "content/pages/faq.json"
        fields:
          - { name: "title", label: "Page Title", widget: "string" }
          - { name: "subtitle", label: "Subtitle", widget: "string" }
          - name: "items"
            label: "FAQ Items"
            widget: "list"
            fields:
              - { name: "question", label: "Question", widget: "string" }
              - { name: "answer", label: "Answer", widget: "text" }

      # --- About ---
      - name: "about"
        label: "About Page"
        file: "content/pages/about.json"
        fields:
          - { name: "title", label: "Page Title", widget: "string" }
          - { name: "intro", label: "Intro Text", widget: "text" }
          - name: "sections"
            label: "Content Sections"
            widget: "list"
            fields:
              - { name: "heading", label: "Heading", widget: "string" }
              - { name: "content", label: "Content", widget: "text" }

      # --- Shipping ---
      - name: "shipping"
        label: "Shipping Page"
        file: "content/pages/shipping.json"
        fields:
          - { name: "title", label: "Page Title", widget: "string" }
          - { name: "intro", label: "Intro Text", widget: "text" }
          - { name: "free_shipping_min", label: "Free Shipping Min ($)", widget: "number", value_type: "int" }
          - { name: "shipping_fee", label: "Shipping Fee ($)", widget: "number", value_type: "int" }
          - { name: "delivery_days", label: "Delivery Days", widget: "string" }
          - { name: "provinces", label: "Provinces", widget: "list", field: { name: "province", label: "Province", widget: "string" } }
          - { name: "policies", label: "Policies", widget: "list", field: { name: "policy", label: "Policy", widget: "string" } }

      # --- Returns ---
      - name: "returns"
        label: "Returns Page"
        file: "content/pages/returns.json"
        fields:
          - { name: "title", label: "Page Title", widget: "string" }
          - { name: "intro", label: "Intro Text", widget: "text" }
          - { name: "policies", label: "Policies", widget: "list", field: { name: "policy", label: "Policy", widget: "string" } }

      # --- Loyalty ---
      - name: "loyalty"
        label: "Loyalty Program Page"
        file: "content/pages/loyalty.json"
        fields:
          - { name: "title", label: "Page Title", widget: "string" }
          - { name: "intro", label: "Intro Text", widget: "text" }
          - { name: "points_per_dollar", label: "Points Per Dollar", widget: "number", value_type: "int" }
          - { name: "points_value", label: "Points Value Text", widget: "string" }
          - { name: "signup_bonus", label: "Signup Bonus Points", widget: "number", value_type: "int" }
          - name: "tiers"
            label: "Loyalty Tiers"
            widget: "list"
            fields:
              - { name: "name", label: "Tier Name", widget: "string" }
              - { name: "min_spend", label: "Min Spend ($)", widget: "number", value_type: "int" }
              - { name: "perk", label: "Perks", widget: "string" }
